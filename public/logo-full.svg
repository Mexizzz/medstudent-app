<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bgFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accentFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Mark on the left -->
  <g transform="translate(40 40)">
    <rect x="0" y="0" width="240" height="240" rx="60" fill="url(#bgFull)"/>
    <rect x="0" y="0" width="240" height="240" rx="60" fill="url(#accentFull)" opacity="0.15"/>

    <g transform="translate(120 120)">
      <circle cx="0" cy="0" r="75" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
      <rect x="-16" y="-55" width="32" height="110" rx="8" fill="white"/>
      <rect x="-55" y="-16" width="110" height="32" rx="8" fill="white"/>
      <g transform="translate(48 -48)">
        <path d="M0 -11 L3 -3 L11 0 L3 3 L0 11 L-3 3 L-11 0 L-3 -3 Z" fill="#38bdf8"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="320" y="180" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="120" letter-spacing="-4">
    <tspan fill="#0f172a">Med</tspan><tspan fill="#6366f1">Study</tspan>
  </text>

  <!-- Tagline -->
  <text x="324" y="230" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="22" fill="#64748b" letter-spacing="6">
    AI · STUDY · ACE
  </text>
</svg>
